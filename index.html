    // 克隆模型，避免重复加载模型
    function cloneModel(obj, x, y, z, name) { //params: 模型， 坐标xyz，自定义数据
        const cloneObj = obj.clone();
        cloneObj.name = name
        // cloneObj.position.set(x, y, z);
        // cloneObj.children.map((v, i) => { //克隆材质
        //     if (v.material) {
        //     v.material = obj.children[i].material.clone();
        //     }
        // });

        // 为克隆的所有材质和纹理创建新的实例
        cloneObj.traverse(child => {
        if (child instanceof THREE.Mesh) {
            // child.position = child.position.clone();
            child.material = child.material.clone();
            
            if (child.material.map) {
            child.material.map = child.material.map.clone();
            }
            // 因为对led继续了放大，所以需要调整坐标
            child.position.set(x/magnification, y/magnification, z/magnification);
            
            
            if(child.name == "Cylinder_0")
            {
                this.mesh.push(child); 
            }
        }
        });
        // cloneObj.$data = {
        //     name: name
        // }
        
        // console.log(cloneObj)
        // this.mesh.add(cloneObj);
        this.group.add(cloneObj);

    }

    // 遍历场景中的所有对象
    function findGroupByName(name) {
        let result = null;
        scene.traverse(function(child) {
            if (child instanceof THREE.Group && child.name === name) {
            result = child;
            }
        });
        return result;
    }

    // 控制group对象中某个物体的亮灭。传入物体，和led的状态
    function LedShow(index, status){
        var object = findGroupByName(index + "");
        if (object) {   // 找到了具有该名称的组对象
            object.traverse(function(child) {
                if (child instanceof THREE.Mesh) {
                    if ( child.isMesh ) {
                        if(child.name == "Cylinder_0")
                        {
                            child.material.color.set(status); // 点亮
                            child.material.emissive.set(child.material.color)
                        }
                    }
                }
            });
        }
    }

        // 绘制路网
        function initGround() {
            var geometry = new THREE.Geometry();
            geometry.vertices.push(new THREE.Vector3(0, -20, 0));
            geometry.vertices.push(new THREE.Vector3(length, -20, 0));

            for (var i = 0; i <= length / ws; i++) {
                var material = new THREE.LineBasicMaterial({
                    color: 0x808080
                });
                var line = new THREE.Line(geometry, material);
                line.position.z = i * ws;
                scene.add(line);
                group.add(line);

                var line = new THREE.Line(geometry, material);
                line.position.x = i * ws;
                line.position.z = length;
                line.rotation.y = 90 * Math.PI / 180;
                scene.add(line);
                group.add(line);
            }
        }

        function postData(dataOrigin)
        {
            var dataOriginlist = [];
            dataOrigin = dataOrigin.split(',')

            dataOrigin.forEach(function(data,index,arr){
                dataOriginlist.push(+data);
            });

            // dataIntArr=dataStrArr.map(function(data){
            //     return +data;
            // });

            // console.log(dataOriginlist.length)

            var sendData = [];
            var sendDataArray = [];
            var sendDataItem = [];
            
            // 每65个为1组
            for(var i=0;i<dataOriginlist.length;i+=65){
                sendData.push(dataOriginlist.slice(i,i+65));
            }
            // console.log(sendData)


            // 每3个为1组发送数据
            for(var i = 0; i<sendData.length; i+=3)
            {
                // console.log(sendData.slice(i,i+3))
                sendDataArray= sendData.slice(i,i+3);
                
                for(var j=0; j < sendDataArray.length; j++)
                {
                    // console.log(sendDataArray[j][0])
                    timeWait += parseInt(sendDataArray[j][0])
                }
                console.log(timeWait * 100)

                sendDataConst = '{"code":200,"data":' + JSON.stringify(sendDataArray) + '}'
                console.log(sendDataConst)

                iotPostData("/data", sendDataConst);

                // if(timeWait <= 5)   // 如果时间小于等于0.5s,则直接发送数据
                // {
                //     iotPostData("/data", sendDataConst);
                // }else
                // {
                //     console.log('等待接收端即将播放完动画')
                //     // sleep 单位为1毫秒。timeWait单位为100ms 
                //     delayTime((timeWait-1) * 100);
                //     iotPostData("/data", sendDataConst);
                // }

                timeWait = 0;
            }

            timeWait = 0
        }

                if(videlistlength != 0 && ledanimatelooppauseflag == 0){  // 存在数据且暂停的不是循环播放
                    ledanimateflag = 1; // 启动动画
                }else if(videlistlength != 0)   // 存在数据，暂停的是循环播放
                {
                    ledanimateloopflag = 1;
                    ledanimatelooppauseflag = 0;    // 循环播放未处于暂停状态
                }
            };

            this.停止 = function(){
                ledanimateflag = 0; // 启动动画
                ledanimateloopflag = 0; // 循环播放也关闭
                ledanimatelooppauseflag = 0;    // 循环播放未处于暂停状态

        // 512个，分为8片，从下往上依次为0-7片，每片64个。
        // 顺序为：从左往右，从里往外。某一片，从里往外依次为第0-7行，从左往右依次为第0-7个
        // (x,y,z)->数组下标：所以(0,0,0)->0,(1,0,0)->1,···,(7,0,0)->7。
        // (0,0,1)->7，···(0,0,7)->15
        // (0,1,0)->64
        // 转换坐标，将坐标变为数组下标
        function transformIndex(x, y, z){
            var index = 0;
            x = x / gapSize;
            y = y / gapSize;
            z = z / gapSize;

            console.log("x:" + x + " y:" + y + " z:" + z)
            index = x + z * cubeSize + y * cubeSize * cubeSize;
            // console.log(index);

            return index
        }

            // console.log(LedColor)

            return index;    // 返回led当前颜色
        }

        }

    function transPosition(position) {
        let world_vector = new THREE.Vector3(position.x, position.y, position.z);
        let vector = world_vector.project(camera);
        let halfWidth = window.innerWidth / 2,
            halfHeight = window.innerHeight / 2;
        return {
            x: Math.round(vector.x * halfWidth + halfWidth),
            y: Math.round(-vector.y * halfHeight + halfHeight)
        };
    }


    function initledanimate(){
        // 归零所有变量
        ledanimateflag = 0; // 不用播放动画了
        videlistlength = 0;    // 动画数据有多长
        videolistindex = 0; // 动画索引，当前读取到第几个了
        startTime = 0;  // 动画启动的时间
        currentTime = 0;    // 此刻的时间
        videoTime = 0;  // 一个场景需要持续的时间0.1s单位 100ms
    }

    // led动画场景
    function ledanimate(){
        // 播放动画数据
        var index = 0;  // 代表第几个led
        // 每次读一个场景，65个数据，（1个时间，64个为led状态）
        for(var i=videolistindex;i<videolistindex + 65;i++){
            // 第一个为时间,后面64个为led状态
            if(i%65 == 0)
            {
                videoTime = videolist[i] * 100;   // 单位为0.1s
                // index = 0;
                console.log("等待")
                // console.log(videolist)
                // sleep(1000);
            }else{
                for(let offset = 1; offset <= 8; offset++) {
                    // console.log(index)
                    let t = (videolist[i] >> (8 - offset)) & 0b00000001
                    // var object = scene.getObjectByName(index + "");
                    // console.log(object)
                    if(t == 1)  // 需要点亮
                    {
                        LedArry[index] = 1;    // 改为亮的状态
                        // var object = scene.getObjectByName(index + "");
                        // // console.log(object)
                        // object.material.color.set("#ff0000"); // 点亮
                        // object.material.emissive.set(object.material.color);
                        LedShow(index, ledColorUp)
                    }else
                    {
                        LedArry[index] = 0;    // 熄灭的状态
                        // var object = scene.getObjectByName(index + "");
                        // object.material.color.set("#C0C0C0"); // 熄灭
                        // object.material.emissive.set(object.material.color);
                        LedShow(index, ledColorDown)
                    }
                    index += 1;
                }
            }

        }

        videolistindex += 65;   // 记录当前动画索引

        // 记录当前时间
        startTime = new Date().getTime();   // 得到毫秒数

        if(videolistindex >= videlistlength)
        {
            

            if(ledanimateloopflag == 0){    // 未启用了循环播放
                // 归零所有变量
                initledanimate();
            }else
            {
                videolistindex = 0; // 动画索引回到最开始位置
            }

            //播放完先熄灭所有led
            // for(var i=0; i<cubeSize*cubeSize*cubeSize; i++){
            //     var object = scene.getObjectByName(i + "");
            //     object.material.color.set("#C0C0C0"); // 熄灭
            //     LedArry[i] = 0;
            // }
        }
        
    }

    function animate() {
        if(ledanimateflag == 1) // 执行动画数据
        {
            currentTime = new Date().getTime();
            if(currentTime >= startTime + videoTime)// 当前时间已经超过场景执行的预期的时间了
            {
                ledanimate();   // 进入动画
            }
        }

        if(ledanimateloopflag == 1) // 循环播放动画数据
        {
            currentTime = new Date().getTime();
            if(currentTime >= startTime + videoTime)// 当前时间已经超过场景执行的预期的时间了
            {
                ledanimate();   // 进入动画
            }
        }
        // console.log("hi")
        requestAnimationFrame(animate);
        if(ledrotateflag == 1)
        {
            // camera.position.x += 5;
            group.rotateY(0.01);
        }
        // orbit.update();
        controls.update();
        // divRender();
        renderer.render(scene, camera);
    }
</script>
